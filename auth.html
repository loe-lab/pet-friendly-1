<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>데일리펫 - 로그인/회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#DD0035",
              deep: "#12273B",
              sand: "#F4EDE2",
              warm: "#FFB27A",
              ink: "#0F172A",
              line: "#E2E8F0",
              kakao: "#FEE500",
            },
            fontFamily: {
              display: ["Work Sans", "sans-serif"],
              body: ["Work Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 14px;
        transition: border-color 0.2s;
        outline: none;
      }
      .auth-input:focus {
        border-color: #DD0035;
      }
      .auth-input::placeholder {
        color: #94a3b8;
      }
      .agreement-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #f1f5f9;
      }
      .agreement-item:last-child {
        border-bottom: none;
      }
      .agreement-check {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .agreement-check input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: #DD0035;
        cursor: pointer;
      }
      .agreement-more {
        font-size: 12px;
        color: #94a3b8;
        cursor: pointer;
        text-decoration: underline;
      }
      .tab-btn {
        flex: 1;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        border-bottom: 2px solid transparent;
        color: #94a3b8;
        transition: all 0.2s;
        cursor: pointer;
        background: none;
      }
      .tab-btn.active {
        color: #0F172A;
        border-bottom-color: #DD0035;
      }
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #94a3b8;
        font-size: 20px;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-ink font-body">
    <div class="min-h-screen flex items-center justify-center px-4 py-10">
      <div class="w-full max-w-[440px]">
        <!-- 로고 -->
        <div class="text-center mb-8">
          <a href="index.html">
            <span class="text-2xl font-semibold tracking-[0.2em] text-brand" style="font-family: 'Ria Sans', sans-serif;">데일리펫</span>
          </a>
          <p class="text-sm text-slate-500 mt-1">반려견과 함께하는 프리미엄 라이프스타일</p>
        </div>

        <!-- 카드 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <!-- 탭 -->
          <div class="flex border-b border-line">
            <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">로그인</button>
            <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">회원가입</button>
          </div>

          <!-- 로그인 폼 -->
          <div id="login-panel" class="p-8">
            <form id="login-form" class="flex flex-col gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
                <input type="email" id="login-email" class="auth-input" placeholder="이메일 주소를 입력하세요" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호</label>
                <div class="relative">
                  <input type="password" id="login-password" class="auth-input" placeholder="비밀번호를 입력하세요" required />
                  <span class="password-toggle material-icons" onclick="togglePassword('login-password', this)">visibility_off</span>
                </div>
              </div>
              <button type="submit" class="w-full py-3 rounded-xl bg-brand text-white font-semibold text-sm hover:bg-red-700 transition mt-2">
                로그인
              </button>
            </form>

            <div class="flex items-center gap-4 my-6">
              <hr class="flex-1 border-line" />
              <span class="text-xs text-slate-400">또는</span>
              <hr class="flex-1 border-line" />
            </div>

            <!-- 카카오 로그인 -->
            <button id="kakao-login-btn" class="w-full py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition hover:brightness-95" style="background: #FEE500; color: #191919;">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.029 2 1 5.217 1 9.158c0 2.545 1.672 4.778 4.192 6.048l-1.06 3.883c-.094.343.297.62.595.422l4.558-3.045c.233.017.469.025.715.025 4.971 0 9-3.217 9-7.333S14.971 2 10 2z" fill="#191919"/></svg>
              카카오로 시작하기
            </button>

            <p id="login-error" class="text-sm text-brand mt-4 text-center hidden"></p>
          </div>

          <!-- 회원가입 폼 -->
          <div id="signup-panel" class="p-8 hidden">
            <form id="signup-form" class="flex flex-col gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">이름</label>
                <input type="text" id="signup-name" class="auth-input" placeholder="이름을 입력하세요" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">닉네임</label>
                <input type="text" id="signup-nickname" class="auth-input" placeholder="닉네임을 입력하세요" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
                <input type="email" id="signup-email" class="auth-input" placeholder="이메일 주소를 입력하세요" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호</label>
                <div class="relative">
                  <input type="password" id="signup-password" class="auth-input" placeholder="비밀번호 (8자 이상)" minlength="8" required />
                  <span class="password-toggle material-icons" onclick="togglePassword('signup-password', this)">visibility_off</span>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호 확인</label>
                <div class="relative">
                  <input type="password" id="signup-password-confirm" class="auth-input" placeholder="비밀번호를 다시 입력하세요" minlength="8" required />
                  <span class="password-toggle material-icons" onclick="togglePassword('signup-password-confirm', this)">visibility_off</span>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">생년월일</label>
                <input type="date" id="signup-birthdate" class="auth-input" required />
              </div>

              <!-- 동의 항목 -->
              <div class="mt-2 border border-line rounded-xl p-4">
                <div class="agreement-item" style="border-bottom: 2px solid #e2e8f0; padding-bottom: 14px; margin-bottom: 4px;">
                  <label class="agreement-check">
                    <input type="checkbox" id="agree-all" onchange="toggleAllAgreements(this)" />
                    <span class="text-sm font-semibold text-ink">전체 동의하기</span>
                  </label>
                </div>

                <div class="agreement-item">
                  <label class="agreement-check">
                    <input type="checkbox" class="required-agree" data-required="true" />
                    <span class="text-sm text-slate-700">(필수) 만 14세 이상 가입 동의</span>
                  </label>
                  <span class="agreement-more">더 보기</span>
                </div>

                <div class="agreement-item">
                  <label class="agreement-check">
                    <input type="checkbox" class="required-agree" data-required="true" />
                    <span class="text-sm text-slate-700">(필수) 이용약관 동의</span>
                  </label>
                  <span class="agreement-more">더 보기</span>
                </div>

                <div class="agreement-item">
                  <label class="agreement-check">
                    <input type="checkbox" class="required-agree" data-required="true" />
                    <span class="text-sm text-slate-700">(필수) 개인정보 수집/이용 동의</span>
                  </label>
                  <span class="agreement-more">더 보기</span>
                </div>

                <div class="agreement-item">
                  <label class="agreement-check">
                    <input type="checkbox" id="agree-marketing" />
                    <span class="text-sm text-slate-700">(선택) 뉴스레터 및 마케팅 정보 수신 동의</span>
                  </label>
                  <span class="agreement-more">더 보기</span>
                </div>
              </div>

              <button type="submit" id="signup-submit" class="w-full py-3 rounded-xl bg-brand text-white font-semibold text-sm hover:bg-red-700 transition mt-2 disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                가입하기
              </button>
            </form>

            <div class="flex items-center gap-4 my-6">
              <hr class="flex-1 border-line" />
              <span class="text-xs text-slate-400">또는</span>
              <hr class="flex-1 border-line" />
            </div>

            <!-- 카카오 회원가입 -->
            <button id="kakao-signup-btn" class="w-full py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition hover:brightness-95" style="background: #FEE500; color: #191919;">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.029 2 1 5.217 1 9.158c0 2.545 1.672 4.778 4.192 6.048l-1.06 3.883c-.094.343.297.62.595.422l4.558-3.045c.233.017.469.025.715.025 4.971 0 9-3.217 9-7.333S14.971 2 10 2z" fill="#191919"/></svg>
              카카오로 시작하기
            </button>

            <p id="signup-error" class="text-sm text-brand mt-4 text-center hidden"></p>
            <p id="signup-success" class="text-sm text-green-600 mt-4 text-center hidden"></p>
          </div>
        </div>

        <!-- 하단 링크 -->
        <div class="text-center mt-6">
          <a href="index.html" class="text-sm text-slate-500 hover:text-ink transition">← 홈으로 돌아가기</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=20260201"></script>
    <script>
      // 탭 전환
      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        document.getElementById('login-panel').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signup-panel').classList.toggle('hidden', tab !== 'signup');
      }

      // 비밀번호 보기/숨기기
      function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.textContent = 'visibility';
        } else {
          input.type = 'password';
          icon.textContent = 'visibility_off';
        }
      }

      // 전체 동의
      function toggleAllAgreements(checkbox) {
        const allChecks = document.querySelectorAll('#signup-panel input[type="checkbox"]:not(#agree-all)');
        allChecks.forEach(c => c.checked = checkbox.checked);
        checkRequiredAgreements();
      }

      // 개별 동의 체크 시 전체 동의 상태 업데이트
      document.addEventListener('change', (e) => {
        if (e.target.type === 'checkbox' && e.target.id !== 'agree-all') {
          const allChecks = document.querySelectorAll('#signup-panel input[type="checkbox"]:not(#agree-all)');
          const allChecked = Array.from(allChecks).every(c => c.checked);
          document.getElementById('agree-all').checked = allChecked;
          checkRequiredAgreements();
        }
      });

      // 필수 동의 체크 확인 → 가입 버튼 활성화
      function checkRequiredAgreements() {
        const requiredChecks = document.querySelectorAll('.required-agree');
        const allRequired = Array.from(requiredChecks).every(c => c.checked);
        document.getElementById('signup-submit').disabled = !allRequired;
      }

      // 로그인
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('login-error');
        errorEl.classList.add('hidden');

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
          await signIn(email, password);
          // 로그인 후 프로필 없으면 자동 생성
          const user = await getUser();
          if (user) {
            const existing = await getProfile(user.id).catch(() => null);
            if (!existing) {
              await createProfile({
                id: user.id,
                name: user.user_metadata?.name || '',
                nickname: user.user_metadata?.preferred_username || '',
                email: user.email || email,
                marketing_agreed: false
              }).catch(e => console.error('자동 프로필 생성 실패:', e));
            }
          }
          window.location.href = 'index.html';
        } catch (err) {
          errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
          errorEl.classList.remove('hidden');
        }
      });

      // 회원가입
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('signup-error');
        const successEl = document.getElementById('signup-success');
        errorEl.classList.add('hidden');
        successEl.classList.add('hidden');

        const name = document.getElementById('signup-name').value;
        const nickname = document.getElementById('signup-nickname').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const passwordConfirm = document.getElementById('signup-password-confirm').value;
        const birthdate = document.getElementById('signup-birthdate').value;
        const marketingAgreed = document.getElementById('agree-marketing').checked;

        if (password !== passwordConfirm) {
          errorEl.textContent = '비밀번호가 일치하지 않습니다.';
          errorEl.classList.remove('hidden');
          return;
        }

        if (password.length < 8) {
          errorEl.textContent = '비밀번호는 8자 이상이어야 합니다.';
          errorEl.classList.remove('hidden');
          return;
        }

        try {
          const signUpData = await signUp(email, password);
          console.log('signUp 결과:', signUpData);
          const user = signUpData?.user;

          if (user && user.id) {
            try {
              await createProfile({
                id: user.id,
                name,
                nickname,
                email,
                birthdate,
                marketing_agreed: marketingAgreed
              });
            } catch (profileErr) {
              console.error('프로필 생성 실패:', profileErr);
              // 프로필 생성 실패해도 회원가입은 완료로 처리
            }
          } else {
            console.warn('signUp 후 user 객체 없음:', signUpData);
          }

          successEl.textContent = '회원가입이 완료되었습니다! 이메일을 확인해주세요.';
          successEl.classList.remove('hidden');

          // 2초 후 로그인 탭으로 전환
          setTimeout(() => {
            switchTab('login');
            document.getElementById('login-email').value = email;
          }, 2000);
        } catch (err) {
          console.error('회원가입 에러:', err);
          errorEl.textContent = err.message || '회원가입 중 오류가 발생했습니다.';
          errorEl.classList.remove('hidden');
        }
      });

      // 카카오 로그인
      document.getElementById('kakao-login-btn').addEventListener('click', async () => {
        try {
          await signInWithKakao();
        } catch (err) {
          document.getElementById('login-error').textContent = '카카오 로그인에 실패했습니다.';
          document.getElementById('login-error').classList.remove('hidden');
        }
      });

      document.getElementById('kakao-signup-btn').addEventListener('click', async () => {
        try {
          await signInWithKakao();
        } catch (err) {
          document.getElementById('signup-error').textContent = '카카오 로그인에 실패했습니다.';
          document.getElementById('signup-error').classList.remove('hidden');
        }
      });

      // URL 파라미터로 탭 선택
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('tab') === 'signup') {
        switchTab('signup');
      }

      // 이미 로그인된 경우 안내 + 프로필 자동 생성
      (async () => {
        const user = await getUser();
        if (user) {
          // 프로필이 없으면 자동 생성 (카카오 로그인 등)
          const existing = await getProfile(user.id).catch(() => null);
          if (!existing) {
            await createProfile({
              id: user.id,
              name: user.user_metadata?.name || user.user_metadata?.full_name || '',
              nickname: user.user_metadata?.preferred_username || user.user_metadata?.name || '',
              email: user.email || '',
              marketing_agreed: false
            }).catch(e => console.error('자동 프로필 생성 실패:', e));
          }

          // 로그인 상태면 로그아웃 옵션 표시
          const loginPanel = document.getElementById('login-panel');
          const signupPanel = document.getElementById('signup-panel');
          const tabBtns = document.querySelectorAll('.tab-btn');
          tabBtns.forEach(btn => btn.style.display = 'none');
          if (signupPanel) signupPanel.classList.add('hidden');
          if (loginPanel) {
            loginPanel.innerHTML = `
              <div class="text-center py-8">
                <p class="text-lg font-semibold mb-2">이미 로그인되어 있어요</p>
                <p class="text-sm text-slate-500 mb-6">${user.email}</p>
                <div class="flex flex-col gap-3">
                  <a href="index.html" class="w-full py-3 rounded-xl bg-brand text-white font-semibold text-sm text-center hover:bg-red-700 transition">홈으로 가기</a>
                  <button onclick="handleLogout()" class="w-full py-3 rounded-xl border border-line text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">로그아웃</button>
                </div>
              </div>
            `;
          }
        }
      })();

      async function handleLogout() {
        await signOut();
        window.location.reload();
      }
    </script>
  </body>
</html>
