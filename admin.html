<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데일리펫 어드민</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
    .btn-primary { @apply bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition; }
    .btn-secondary { @apply bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition; }
    .btn-danger { @apply bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition; }
    .input-field { @apply w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  
  <!-- 로그인 화면 -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-6">데일리펫 어드민</h1>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
          <input type="email" id="login-email" class="input-field" placeholder="admin@example.com" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
          <input type="password" id="login-password" class="input-field" placeholder="••••••••" required />
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
          로그인
        </button>
        <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <!-- 어드민 대시보드 -->
  <div id="admin-screen" class="hidden">
    <!-- 헤더 -->
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800">데일리펫 어드민</h1>
        <div class="flex items-center gap-4">
          <span id="user-email" class="text-sm text-gray-600"></span>
          <button id="logout-btn" class="text-sm text-red-500 hover:text-red-600">로그아웃</button>
        </div>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-6xl mx-auto p-6">
      <!-- 상단 액션 -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">추천 장소 관리</h2>
        <button id="add-place-btn" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          새 장소 추가
        </button>
      </div>

      <!-- 장소 목록 -->
      <div id="places-list" class="grid gap-4">
        <!-- 동적으로 채워짐 -->
      </div>

      <!-- 로딩 -->
      <div id="loading" class="text-center py-12 text-gray-500">
        불러오는 중...
      </div>

      <!-- 빈 상태 -->
      <div id="empty-state" class="hidden text-center py-12">
        <p class="text-gray-500 mb-4">등록된 장소가 없습니다.</p>
        <button class="text-blue-600 hover:underline" onclick="openModal()">첫 장소를 추가해보세요</button>
      </div>
    </main>
  </div>

  <!-- 장소 추가/수정 모달 -->
  <div id="place-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
      <div class="p-6 border-b border-gray-200">
        <h3 id="modal-title" class="text-xl font-bold">새 장소 추가</h3>
      </div>
      <form id="place-form" class="p-6 space-y-5">
        <input type="hidden" id="place-id" />
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">장소명 *</label>
          <input type="text" id="place-title" class="input-field" placeholder="스테이포레스트 카페" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">위치 *</label>
          <input type="text" id="place-location" class="input-field" placeholder="서울 · 성수" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">카테고리</label>
          <select id="place-category" class="input-field">
            <option value="카페">카페</option>
            <option value="식당">식당</option>
            <option value="운동장">운동장</option>
            <option value="숙소">숙소</option>
            <option value="공원">공원</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">설명</label>
          <textarea id="place-description" class="input-field h-24" placeholder="장소에 대한 설명을 입력하세요"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">태그 (쉼표로 구분)</label>
          <input type="text" id="place-tags" class="input-field" placeholder="실내동반 가능, 카공족, 주차가능" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이미지</label>
          <div id="image-preview" class="mb-3 hidden">
            <img id="preview-img" class="w-full h-48 object-cover rounded-lg" />
          </div>
          <input type="file" id="place-image" accept="image/*" class="input-field" />
          <input type="hidden" id="place-image-url" />
        </div>

        <div class="flex gap-3 pt-4">
          <button type="button" id="cancel-btn" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">
            취소
          </button>
          <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            저장
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div id="delete-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-full max-w-md m-4 p-6">
      <h3 class="text-xl font-bold mb-2">장소 삭제</h3>
      <p class="text-gray-600 mb-6">정말 이 장소를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
      <div class="flex gap-3">
        <button id="delete-cancel" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">
          취소
        </button>
        <button id="delete-confirm" class="flex-1 bg-red-500 text-white py-3 rounded-lg font-semibold hover:bg-red-600 transition">
          삭제
        </button>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    // DOM 요소
    const loginScreen = document.getElementById('login-screen');
    const adminScreen = document.getElementById('admin-screen');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const userEmailEl = document.getElementById('user-email');
    const logoutBtn = document.getElementById('logout-btn');
    const placesList = document.getElementById('places-list');
    const loadingEl = document.getElementById('loading');
    const emptyState = document.getElementById('empty-state');
    const addPlaceBtn = document.getElementById('add-place-btn');
    const placeModal = document.getElementById('place-modal');
    const placeForm = document.getElementById('place-form');
    const cancelBtn = document.getElementById('cancel-btn');
    const deleteModal = document.getElementById('delete-modal');
    const deleteCancel = document.getElementById('delete-cancel');
    const deleteConfirm = document.getElementById('delete-confirm');

    let currentPlaces = [];
    let deleteTargetId = null;

    // 초기화
    async function init() {
      const user = await getUser();
      if (user) {
        showAdmin(user);
        loadPlaces();
      } else {
        showLogin();
      }
    }

    function showLogin() {
      loginScreen.classList.remove('hidden');
      adminScreen.classList.add('hidden');
    }

    function showAdmin(user) {
      loginScreen.classList.add('hidden');
      adminScreen.classList.remove('hidden');
      userEmailEl.textContent = user.email;
    }

    // 로그인
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        loginError.classList.add('hidden');
        const { user } = await signIn(email, password);
        showAdmin(user);
        loadPlaces();
      } catch (error) {
        loginError.textContent = '로그인 실패: ' + error.message;
        loginError.classList.remove('hidden');
      }
    });

    // 로그아웃
    logoutBtn.addEventListener('click', async () => {
      await signOut();
      showLogin();
    });

    // 장소 목록 불러오기
    async function loadPlaces() {
      loadingEl.classList.remove('hidden');
      emptyState.classList.add('hidden');
      placesList.innerHTML = '';

      try {
        currentPlaces = await getPlaces();
        loadingEl.classList.add('hidden');

        if (currentPlaces.length === 0) {
          emptyState.classList.remove('hidden');
          return;
        }

        renderPlaces();
      } catch (error) {
        loadingEl.textContent = '오류: ' + error.message;
      }
    }

    // 장소 목록 렌더링
    function renderPlaces() {
      placesList.innerHTML = currentPlaces.map(place => `
        <div class="bg-white rounded-xl border border-gray-200 p-4 flex gap-4 items-center">
          <div class="w-24 h-24 flex-shrink-0 rounded-lg overflow-hidden bg-gray-100">
            ${place.image_url 
              ? `<img src="${place.image_url}" class="w-full h-full object-cover" />`
              : `<div class="w-full h-full flex items-center justify-center text-gray-400">No Image</div>`
            }
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-gray-800 truncate">${place.title}</h3>
            <p class="text-sm text-gray-500">${place.location || ''}</p>
            <div class="flex flex-wrap gap-1 mt-2">
              ${(place.tags || []).map(tag => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${tag}</span>`).join('')}
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="editPlace(${place.id})" class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </button>
            <button onclick="confirmDelete(${place.id})" class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    // 모달 열기/닫기
    function openModal(place = null) {
      placeModal.classList.remove('hidden');
      document.getElementById('modal-title').textContent = place ? '장소 수정' : '새 장소 추가';
      
      if (place) {
        document.getElementById('place-id').value = place.id;
        document.getElementById('place-title').value = place.title || '';
        document.getElementById('place-location').value = place.location || '';
        document.getElementById('place-category').value = place.category || '카페';
        document.getElementById('place-description').value = place.description || '';
        document.getElementById('place-tags').value = (place.tags || []).join(', ');
        document.getElementById('place-image-url').value = place.image_url || '';
        
        if (place.image_url) {
          document.getElementById('preview-img').src = place.image_url;
          document.getElementById('image-preview').classList.remove('hidden');
        } else {
          document.getElementById('image-preview').classList.add('hidden');
        }
      } else {
        placeForm.reset();
        document.getElementById('place-id').value = '';
        document.getElementById('place-image-url').value = '';
        document.getElementById('image-preview').classList.add('hidden');
      }
    }

    function closeModal() {
      placeModal.classList.add('hidden');
      placeForm.reset();
    }

    addPlaceBtn.addEventListener('click', () => openModal());
    cancelBtn.addEventListener('click', closeModal);

    // 이미지 미리보기
    document.getElementById('place-image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('preview-img').src = e.target.result;
          document.getElementById('image-preview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // 장소 저장
    placeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('place-id').value;
      const imageFile = document.getElementById('place-image').files[0];
      let imageUrl = document.getElementById('place-image-url').value;

      try {
        // 이미지 업로드
        if (imageFile) {
          imageUrl = await uploadImage(imageFile);
        }

        const placeData = {
          title: document.getElementById('place-title').value,
          location: document.getElementById('place-location').value,
          category: document.getElementById('place-category').value,
          description: document.getElementById('place-description').value,
          tags: document.getElementById('place-tags').value.split(',').map(t => t.trim()).filter(t => t),
          image_url: imageUrl
        };

        if (id) {
          await updatePlace(parseInt(id), placeData);
        } else {
          await createPlace(placeData);
        }

        closeModal();
        loadPlaces();
      } catch (error) {
        alert('저장 실패: ' + error.message);
      }
    });

    // 장소 수정
    function editPlace(id) {
      const place = currentPlaces.find(p => p.id === id);
      if (place) openModal(place);
    }

    // 삭제 확인
    function confirmDelete(id) {
      deleteTargetId = id;
      deleteModal.classList.remove('hidden');
    }

    deleteCancel.addEventListener('click', () => {
      deleteModal.classList.add('hidden');
      deleteTargetId = null;
    });

    deleteConfirm.addEventListener('click', async () => {
      if (deleteTargetId) {
        try {
          await deletePlace(deleteTargetId);
          deleteModal.classList.add('hidden');
          deleteTargetId = null;
          loadPlaces();
        } catch (error) {
          alert('삭제 실패: ' + error.message);
        }
      }
    });

    // 모달 외부 클릭 시 닫기
    placeModal.addEventListener('click', (e) => {
      if (e.target === placeModal) closeModal();
    });

    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) {
        deleteModal.classList.add('hidden');
        deleteTargetId = null;
      }
    });

    // 초기화 실행
    init();
  </script>
</body>
</html>
